services:
  mongo:
    image: mongo:7
    container_name: chatfix-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: chatfix-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGODB_URI: mongodb://mongo:27017/chatfix
      LM_STUDIO_URL: http://host.docker.internal:1234
      MODEL_NAME: ${MODEL_NAME}
      API_KEY: ${API_KEY}
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: chatfix-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
  whatsapp_auth:
